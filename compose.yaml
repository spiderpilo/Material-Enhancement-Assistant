services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /workspace
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000 --app-dir backend
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /workspace/backend
          ignore:
            - __pycache__/
            - .venv/
            - requirements.txt
        - path: ./backend/requirements.txt
          action: rebuild

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app
          ignore:
            - .next/
            - node_modules/
            - package.json
            - package-lock.json
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild

volumes:
  frontend_node_modules:
  frontend_next:
